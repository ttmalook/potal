# =====================================================================
# SSC Partner Portal — 동일 오리진 리버스프록시
#   /            → 정적 SPA(dist) 서빙 (무인증: #share 게시 링크 로드 위해)
#   /api/public  → 백엔드 프록시 (무인증 공개)  ┐ 라우팅/인증은 백엔드가 판단
#   /api/*       → 백엔드 프록시 (앱단 JWT 인증) ┘
#   CSP·HSTS 등 보안 헤더는 여기(nginx)에서 단일 소스로 부여 (DEPLOY_SECURITY.md)
# =====================================================================
upstream ssc_backend { server backend:8787; }

# 평문 HTTP → HTTPS 강제 리다이렉트
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name _;

  # 인증서: 스테이징=자체서명(엔트리포인트 생성) / 운영=실인증서로 교체 마운트
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:5m;
  ssl_session_timeout 10m;

  root  /usr/share/nginx/html;
  index index.html;

  # ── 보안 헤더 (단일 소스) ──
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;
  add_header X-Robots-Tag "noindex, nofollow" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; form-action 'self'; upgrade-insecure-requests" always;
  # HSTS 는 엔트리포인트가 ENABLE_HSTS 에 따라 채움 (자체서명/스테이징 구간엔 비움)
  include /etc/nginx/snippets/hsts.conf;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # API → 백엔드 (쿠키/Set-Cookie 그대로 통과)
  location /api/ {
    proxy_pass http://ssc_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # SPA — 클라이언트 라우팅 / #share 딥링크 폴백
  location / {
    try_files $uri $uri/ /index.html;
  }
}
