# =====================================================================
# Validation Sandbox (Partner Lab PoC) — Docker 스캐폴드 (Phase B)
#  - HTTP 헤더 카테고리 타깃(취약/조치) + Playwright 증적 수집기 + Postgres.
#  - 격리 네트워크. 고객 도메인 접근 없음.
#  - 실행:  cd lab && docker compose up --build
#  - 백엔드 연동:  backend/.env 에 LAB_COLLECTOR=docker, LAB_COLLECTOR_URL=http://localhost:8899
#  (TLS/DNS/네트워크 타깃 + 스캐너는 Phase D에서 추가)
# =====================================================================
services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ssc_portal
      POSTGRES_USER: ssc
      POSTGRES_PASSWORD: ssc_dev_pw
    # 로컬 루프백에만 바인딩 — 네트워크로 노출되지 않음(서버 배포 시 필수).
    # 로컬 개발은 localhost 접속이라 그대로 동작.
    ports: ['127.0.0.1:5432:5432']
    volumes:
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    networks: [labnet]

  lab-http-vulnerable:
    restart: unless-stopped
    image: nginx:1.27-alpine
    volumes:
      - ./targets/http-vulnerable/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./targets/http-vulnerable/site:/usr/share/nginx/html:ro
    networks: [labnet]

  lab-http-remediated:
    restart: unless-stopped
    image: nginx:1.27-alpine
    volumes:
      - ./targets/http-remediated/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./targets/http-remediated/site:/usr/share/nginx/html:ro
    networks: [labnet]

  lab-http-generic:
    restart: unless-stopped
    build: ./targets/http-generic   # 레시피 주도 제네릭 HTTP 응답기(AI Lab Builder Phase 1)
    networks: [labnet]

  # 수동 검증 하니스용 가변(mutable) HTTP 타깃 — 스크립트가 런타임에 헤더를 넣고/빼며 실제 조치 재현.
  lab-http-drill:
    restart: unless-stopped
    build: ./targets/http-drill
    volumes:
      - ./verify:/verify:ro        # reproduce.sh/remediate.sh 를 컨테이너 안에서 실행
    networks: [labnet]

  # 수동 검증 하니스용 가변(mutable) TLS 타깃 — 프로토콜/cipher/인증서를 런타임에 바꿔 실제 TLS 조치 재현.
  lab-tls-drill:
    restart: unless-stopped
    build: ./targets/tls-drill
    volumes:
      - ./verify:/verify:ro
    networks: [labnet]

  # 수동 검증 하니스용 가변(mutable) DNS 타깃 — SPF/DMARC/DKIM TXT 를 런타임에 바꿔 실제 DNS 조치 재현.
  lab-dns-drill:
    restart: unless-stopped
    build: ./targets/dns-drill
    volumes:
      - ./verify:/verify:ro
    networks: [labnet]

  # 수동 검증 하니스용 가변(mutable) SSH 타깃 — sshd Ciphers/KexAlgorithms 를 런타임에 바꿔 실제 SSH 조치 재현.
  lab-ssh-drill:
    restart: unless-stopped
    build: ./targets/ssh-drill
    volumes:
      - ./verify:/verify:ro
    networks: [labnet]

  # 수동 검증 하니스용 가변(mutable) 네트워크 노출 타깃 — socat 로 포트를 열고/닫아 서비스 노출/차단 재현.
  lab-net-drill:
    restart: unless-stopped
    build: ./targets/net-drill
    volumes:
      - ./verify:/verify:ro
    networks: [labnet]

  lab-tls-vulnerable:
    restart: unless-stopped
    build: ./targets/tls-vulnerable
    networks: [labnet]

  lab-tls-remediated:
    restart: unless-stopped
    build: ./targets/tls-remediated
    networks: [labnet]

  lab-tls-revoked:
    restart: unless-stopped
    build: ./targets/tls-revoked   # CA/CRL + valid/revoked 인증서를 HTTP(:80)로 서빙(폐지 재현)
    networks: [labnet]

  lab-dns-vulnerable:
    restart: unless-stopped
    image: coredns/coredns:1.11.1
    command: ['-conf', '/Corefile']
    volumes:
      - ./targets/dns-vulnerable/Corefile:/Corefile:ro
      - ./targets/dns-vulnerable/db.example.lab:/zones/db.example.lab:ro
    networks: [labnet]

  lab-dns-remediated:
    restart: unless-stopped
    image: coredns/coredns:1.11.1
    command: ['-conf', '/Corefile']
    volumes:
      - ./targets/dns-remediated/Corefile:/Corefile:ro
      - ./targets/dns-remediated/db.example.lab:/zones/db.example.lab:ro
    networks: [labnet]

  # 네트워크: 데이터 주도 다중 포트 노출(취약) vs 미노출(조치)
  #  취약 타깃은 아래 포트 목록을 모두 리스닝 → 서비스 노출 이슈(telnet/ftp/rdp/vnc/dns/
  #  mysql/redis/mongo/elastic/smb/ldap/imap 등) 재현. 조치 타깃은 아무 포트도 안 열어
  #  → nmap 스캔 시 open↔closed 로 차이 발생. 새 포트 추가는 아래 목록에 숫자만 추가.
  lab-net-vulnerable:
    restart: unless-stopped
    build: ./targets/net-vulnerable   # socat 다중 포트 리스너(안정) — listen.sh 에 포트 목록
    networks: [labnet]

  lab-net-remediated:
    restart: unless-stopped
    image: busybox:1.36
    command: ['sh', '-c', 'sleep infinity']
    networks: [labnet]

  # SSH: 약한 알고리즘 제공(취약) vs 강한 알고리즘만(조치)
  lab-ssh-vulnerable:
    restart: unless-stopped
    build: ./targets/ssh-vulnerable
    networks: [labnet]
  lab-ssh-remediated:
    restart: unless-stopped
    build: ./targets/ssh-remediated
    networks: [labnet]

  evidence-collector:
    restart: unless-stopped
    hostname: lab-evidence-collector   # 증적의 셸 프롬프트에 표시되는 실제 호스트명
    build: ./evidence-collector
    environment:
      # 수집기가 접근할 랩 타깃(내부 네트워크 서비스명)
      HTTP_VULNERABLE_URL: http://lab-http-vulnerable
      HTTP_REMEDIATED_URL: http://lab-http-remediated
      HTTP_GENERIC_URL: http://lab-http-generic
      TLS_VULNERABLE_HOST: lab-tls-vulnerable
      TLS_REMEDIATED_HOST: lab-tls-remediated
      TLS_REVOKED_HOST: lab-tls-revoked
      DNS_VULNERABLE_HOST: lab-dns-vulnerable
      DNS_REMEDIATED_HOST: lab-dns-remediated
      DNS_ZONE: example.lab
      NET_VULNERABLE_HOST: lab-net-vulnerable
      NET_REMEDIATED_HOST: lab-net-remediated
      SSH_VULNERABLE_HOST: lab-ssh-vulnerable
      SSH_REMEDIATED_HOST: lab-ssh-remediated
    ports: ['8899:8899']
    volumes:
      - labartifacts:/artifacts   # 캡처 스크린샷 영속(재빌드에도 유지)
    networks: [labnet]

networks:
  labnet:
    driver: bridge
    # 외부 egress는 운영 정책에 맞게 제한(고객 도메인/인터넷 접근 차단 권장)

volumes:
  pgdata:
  labartifacts:
