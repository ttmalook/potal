server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 보안 헤더(서버 레벨)는 런타임에 주입/제거된다 — 검증 스크립트가 headers/ 를 조작 후 reload.
    # 빈 디렉터리면 매칭 없음 → 헤더 없는 취약 상태.
    include /etc/nginx/sec/headers/*.conf;

    location / {
        # 리다이렉트 등 location 레벨 조작용(예: insecure_https_redirect). 비어 있으면 정적 서빙.
        include /etc/nginx/sec/root/*.conf;
        try_files $uri $uri/ =404;
    }

    # 헬스 체크(조치 후 서비스 무해 확인용)
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }
}
