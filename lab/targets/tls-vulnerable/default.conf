server {
    listen 443 ssl;
    server_name _;
    ssl_certificate     /etc/nginx/tls.crt;
    ssl_certificate_key /etc/nginx/tls.key;
    # 취약(의도적): 구버전 프로토콜(TLS1.0/1.1) 제공 + 약한 cipher 허용(3DES/RC4 등, SECLEVEL=0)
    #  + 1024비트 키(Dockerfile) + 유효기간 과다 3650일(Dockerfile)
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers 'ALL:@SECLEVEL=0';
    ssl_prefer_server_ciphers off;
    location / { default_type text/plain; return 200 "Standard Lab TLS target (vulnerable)\n"; }
}
