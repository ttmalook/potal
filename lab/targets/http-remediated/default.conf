# 조치 상태(일반 조치 방향 시연): 보안 헤더 적용, 서버 토큰/기술스택 숨김
server {
    listen 80;
    server_name _;
    server_tokens off;                 # Server 버전 숨김 (스톡 nginx는 X-Powered-By 미노출)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 세션 쿠키를 안전하게 세팅: HttpOnly + SameSite (Secure는 HTTPS 필요라 랩(HTTP)에선 생략)
    add_header Set-Cookie "SID=lab-session-123; Path=/; HttpOnly; SameSite=Strict" always;
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
    # CSP 변형 조치: 광범위/unsafe 지시자 제거(출처 제한 · unsafe-* 제거)
    location = /csp-broad {
        add_header Content-Security-Policy "default-src 'self'; object-src 'none'" always;
        default_type text/html;
        return 200 "csp-broad lab page";
    }
    location = /csp-unsafe {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'" always;
        default_type text/html;
        return 200 "csp-unsafe lab page";
    }
    # 조치: 안전한 리다이렉트 — 301(영구) + HTTPS 목적지
    location = /secure-redirect {
        return 301 https://$host/dashboard;
    }
}
