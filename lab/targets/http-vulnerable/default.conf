# 취약 상태(의도적): 보안 헤더 없음, 서버 토큰/기술스택 노출
server {
    listen 80;
    server_name _;
    server_tokens on;                  # Server 버전 노출
    add_header X-Powered-By "Express" always;  # 기술스택 노출(의도적)
    # 세션 쿠키를 취약하게 세팅: HttpOnly/SameSite 없음
    add_header Set-Cookie "SID=lab-session-123; Path=/" always;
    # HSTS / CSP / X-Content-Type-Options / X-Frame-Options 없음 (취약)
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
    # CSP 변형 재현용 전용 경로(루트/guestbook 과 분리 → csp_no_policy 와 충돌 없음)
    #  취약: 광범위 지시자(default-src * — 모든 출처 허용)
    location = /csp-broad {
        add_header Content-Security-Policy "default-src * data: blob: 'unsafe-inline'" always;
        default_type text/html;
        return 200 "csp-broad lab page";
    }
    #  취약: unsafe-* 지시자(CSP 있어도 인라인 스크립트 실행 허용)
    location = /csp-unsafe {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'" always;
        default_type text/html;
        return 200 "csp-unsafe lab page";
    }
    #  취약: 안전하지 않은 리다이렉트 패턴 — 302(임시) + HTTP 목적지(암호화 안 됨)
    location = /secure-redirect {
        return 302 http://$host/dashboard;
    }
}
